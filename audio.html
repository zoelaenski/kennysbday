<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Happy Birthday Kenny ✨</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Dancing+Script:wght@700&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>
<body class="video-bg">
  <video autoplay muted loop playsinline id="bg-video-blur">
  <source src="video1.mp4" type="video/mp4">
</video>
<video autoplay muted loop playsinline id="bg-video">
  <source src="video1.mp4" type="video/mp4">
</video>
  <section class="song-section">
    <p class="section-eyebrow">A song just for you 🎀</p>
    <h2 class="song-title">Moment For Life</h2>
    <p class="song-artist">Nicki Minaj</p>

    <div class="player">
      <audio id="audio" src="./song.mp3" type="audio/mpeg"></audio>

      <div class="progress-bar-container" onclick="seek(event)">
        <div class="progress-bar" id="progress"></div>
      </div>

      <div class="player-controls">
        <span class="time" id="current-time">0:00</span>
        <button class="play-btn" onclick="togglePlay()" id="play-btn">▶</button>
        <span class="time" id="duration">0:00</span>
      </div>
    </div>

    <p class="song-dedication">
      "This one's for you Kenny.... live your moment. 🥂"
    </p>
  </section>

  <script src="script.js"></script>
</body>
</html>
